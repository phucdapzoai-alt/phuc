<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Bảo Châu</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:black;
overflow:hidden;
color:white;
}

.page{
position:absolute;
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

h1{
color:#ff69b4;
font-size:5rem;
text-shadow:
0 0 10px #ff69b4,
0 0 20px #ff69b4,
0 0 40px #ff69b4;
animation:float 3s ease-in-out infinite;
text-align:center;
}

p{
font-size:1.5rem;
margin-top:20px;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

.next{
position:absolute;
right:30px;
bottom:40px;
font-size:50px;
cursor:pointer;
color:#ff69b4;
animation:float 2s infinite;
}

button{
padding:15px 30px;
margin:15px;
font-size:1.2rem;
border:none;
border-radius:30px;
cursor:pointer;
background:#ff69b4;
color:white;
}

.heart{
position:absolute;
font-size:25px;
color:#ff69b4;
animation:heartFly 4s linear infinite;
}

@keyframes heartFly{
0%{
transform:translateY(100vh) scale(0.5);
opacity:1;
}
100%{
transform:translateY(-100px) scale(1.5);
opacity:0;
}
}

.rose{
position:absolute;
font-size:40px;
animation:fall 6s linear infinite;
}

.money{
position:absolute;
font-size:35px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
}
100%{
transform:translateY(110vh);
}
}

.gift{
font-size:2rem;
color:#ff69b4;
margin-top:40px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- Trang 1 -->
<div class="page active" id="page1">
<h1>Hello Bảo Châu</h1>

<div class="next" onclick="showPage(2)">
💖➜
</div>
</div>

<!-- Trang 2 -->
<div class="page" id="page2">
<h1>Bảo Châu còn là thiếu nhi không?</h1>

<div>
<button onclick="showPage(3)">Có</button>
<button onclick="khong()">Không</button>
</div>
</div>

<!-- Trang 3 -->
<div class="page" id="page3">
<div id="hearts"></div>

<h1>🎉 Chúc Mừng Thiếu Nhi Bảo Châu 🎉</h1>

<div class="gift">
Bé ơi quà nè 💝
</div>

<div class="next" onclick="showPage(4)">
💖➜
</div>
</div>

<!-- Trang 4 -->
<div class="page" id="page4">
<div id="flowers"></div>

<h1>🌹 Gửi số TK 🌹</h1>
<p>Để nhận quà nha 😆💸</p>
</div>

<script>

function showPage(n){
document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});

document.getElementById('page'+n).classList.add('active');

if(n===3){
createHearts();
}

if(n===4){
createFlowers();
}
}

function khong(){
alert("Chắc chưa? 😏 Chọn Có đi nè!");
}

function createHearts(){

const container=document.getElementById("hearts");
container.innerHTML="";

for(let i=0;i<80;i++){

let h=document.createElement("div");

h.className="heart";
h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";
h.style.animationDelay=Math.random()*4+"s";
h.style.fontSize=(20+Math.random()*40)+"px";

container.appendChild(h);
}
}

function createFlowers(){

const container=document.getElementById("flowers");
container.innerHTML="";

for(let i=0;i<60;i++){

let flower=document.createElement("div");

flower.className=Math.random()>0.5 ? "rose":"money";

flower.innerHTML=Math.random()>0.5 ? "🌹":"💸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDelay=Math.random()*5+"s";

container.appendChild(flower);
}
}

</script>

</body>
</html>
